const nav=document.getElementById('nav'),cont=document.getElementById('content');
let cur=0;
function gmapUrl(q){return'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q);}
function mealPills(bk,dn){
  return'<div class="meal-pills">'
    +(bk?'<span class="mpill mpill-bk">🍳 含早餐</span>':'<span class="mpill mpill-no">早餐 ✕</span>')
    +(dn?'<span class="mpill mpill-dn">🍽 含晚餐</span>':'<span class="mpill mpill-no">晚餐 ✕</span>')
    +'</div>';
}
function renderNav(){
  nav.innerHTML='';
  days.forEach((d,i)=>{
    const b=document.createElement('div');
    b.className='db'+(i===cur?' act':'');
    b.innerHTML='<div class="dn">Day '+d.day+'</div><div class="dl">'+d.label+'</div>';
    b.onclick=()=>{cur=i;renderNav();renderDay();window.scrollTo({top:0,behavior:'smooth'});};
    nav.appendChild(b);
  });
}
function renderDay(){
  const d=days[cur];
  let h='<div class="dhdr"><div class="drow"><span class="dbadge">Day '+d.day+'</span><span class="datebadge">'+d.date+'</span></div><div class="dtitle">'+d.title+'</div></div>'
       +'<div class="tip"><span>💡</span><span>'+d.tip+'</span></div>';
  if(d.weather){
    const w=d.weather;
    h+='<div class="weather-bar">'
      +'<div class="w-icon">'+w.icon+'</div>'
      +'<div class="w-info">'
      +'<div class="w-loc">📍 '+w.loc+' · 歷史氣候參考</div>'
      +'<div class="w-temp">'+w.temp+'</div>'
      +'<div class="w-desc">'+w.desc+'</div>'
      +'<div class="w-note">'+w.note+'</div>'
      +'</div></div>';
  }
  if(d.hotel){
    h+='<div class="htl"><div class="htl-top"><span style="font-size:15px;flex-shrink:0">🏨</span>'
      +'<div style="flex:1;margin-left:8px"><div class="htl-n">'+d.hotel.name+'</div>'
      +'<a class="htl-gmap" href="'+gmapUrl(d.hotel.map)+'" target="_blank">📍 Google Map</a>'
      +'</div></div>'+mealPills(d.hotel.bk,d.hotel.dn)+'</div>';
  }
  h+='<div class="tl">';
  d.spots.forEach(s=>{
    const resvH=s.resv?'<span class="resv">✓ 已預約</span>':'';
    const timeH=s.time?'<span class="ctime">'+s.time+'</span>':'';
    const noteH=s.note?(s.note.includes('動線')?'<div class="abox">'+s.note+'</div>':'<div class="hbox">'+s.note+'</div>'):'';
    h+='<div class="sc"><div class="dw"><div class="dot '+s.dot+'"></div></div>'
      +'<div class="card">'
      +'<div class="ct"><span class="ctype">'+s.type+'</span>'+timeH+resvH+'</div>'
      +'<div class="cn">'+s.name+'</div>'
      +'<div class="cd">'+s.desc+'</div>'
      +noteH
      +'<div class="tags">'+(s.tags||[]).map(t=>'<span class="tag">'+t+'</span>').join('')+'</div>'
      +'<a class="gmap-btn" href="'+gmapUrl(s.map)+'" target="_blank">📍 Google Map</a>'
      +'</div></div>';
  });
  if(d.free){
    h+='<div style="margin-left:38px"><div class="free-block"><div class="free-icon">🌿</div>下午以後自由安排<br>隨心所至，好好享受神戶最後時光</div></div>';
  }
  h+='</div>';
  cont.innerHTML=h;
}
renderNav();renderDay();
</script>
